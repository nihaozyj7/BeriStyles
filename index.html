<!DOCTYPE html>
<html lang="zh-CN" class="theme-dark">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通用表单样式文档</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--app-bg-body);
        color: var(--form-text);
        height: 100vh;
        overflow: hidden;
      }

      /* 布局容器 */
      .app-container {
        display: flex;
        height: 100vh;
      }

      /* 侧边栏 */
      .sidebar {
        width: 260px;
        background-color: var(--app-bg-surface);
        border-right: 1px solid var(--form-border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Logo 区域 */
      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--form-border);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: 600;
        color: var(--form-text);
      }

      .logo-icon {
        font-size: 24px;
      }

      .logo-subtitle {
        font-size: 12px;
        color: var(--form-placeholder);
        font-weight: 400;
        margin-top: 4px;
      }

      /* 主题切换 */
      .theme-toggle-bar {
        padding: 15px 20px;
        border-bottom: 1px solid var(--form-border);
      }

      .theme-toggle-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 16px;
        background-color: var(--bg-primary);
        border: 1px solid var(--form-border);
        border-radius: 6px;
        color: var(--form-text);
        cursor: pointer;
        transition: all 0.3s;
        font-size: 14px;
      }

      .theme-toggle-btn:hover {
        border-color: var(--form-border-hover);
      }

      /* 导航菜单 */
      .nav-menu {
        flex: 1;
        overflow-y: auto;
        padding: 10px 0;
      }

      .nav-section {
        margin-bottom: 8px;
      }

      .nav-section-title {
        padding: 8px 20px;
        font-size: 12px;
        font-weight: 600;
        color: var(--form-placeholder);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .nav-item {
        display: block;
        padding: 10px 20px;
        color: var(--form-text);
        text-decoration: none;
        font-size: 14px;
        transition: all 0.2s;
        border-left: 3px solid transparent;
      }

      .nav-item:hover {
        background-color: var(--bg-disabled);
        color: var(--form-border-focus);
      }

      .nav-item.active {
        background-color: rgba(24, 144, 255, 0.1);
        color: var(--form-border-focus);
        border-left-color: var(--form-border-focus);
      }

      .nav-item .icon {
        display: inline-block;
        width: 20px;
        margin-right: 8px;
        text-align: center;
      }

      /* 主内容区 */
      .main-content {
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .content-iframe {
        width: 100%;
        height: 100%;
        border: none;
        background-color: var(--app-bg-body);
      }

      /* 滚动条样式 */
      .nav-menu::-webkit-scrollbar {
        width: 6px;
      }

      .nav-menu::-webkit-scrollbar-track {
        background: transparent;
      }

      .nav-menu::-webkit-scrollbar-thumb {
        background: var(--form-border);
        border-radius: 3px;
      }

      .nav-menu::-webkit-scrollbar-thumb:hover {
        background: var(--form-placeholder);
      }
    </style>
  </head>

  <body>
    <div class="app-container">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <span class="logo-icon">📝</span>
            <div>
              <div>通用表单样式</div>
              <div class="logo-subtitle">轻量级双主题表单系统</div>
            </div>
          </div>
        </div>

        <div class="theme-toggle-bar">
          <button class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">深色模式</span>
          </button>
        </div>

        <nav class="nav-menu">
          <div class="nav-section">
            <div class="nav-section-title">开始</div>
            <a href="./html/intro.html" class="nav-item active" data-page="intro" target="content-frame">
              <span class="icon">💡</span>简介与快速开始
            </a>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">基础组件</div>
            <a href="./html/input.html" class="nav-item" data-page="input" target="content-frame">
              <span class="icon">📥</span>输入框 Input
            </a>
            <a href="./html/textarea.html" class="nav-item" data-page="textarea" target="content-frame">
              <span class="icon">📄</span>文本域 Textarea
            </a>
            <a href="./html/select.html" class="nav-item" data-page="select" target="content-frame">
              <span class="icon">📋</span>下拉框 Select
            </a>
            <a href="./html/button.html" class="nav-item" data-page="button" target="content-frame">
              <span class="icon">🔘</span>按钮 Button
            </a>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">选择组件</div>
            <a href="./html/checkbox.html" class="nav-item" data-page="checkbox" target="content-frame">
              <span class="icon">☑️</span>复选框 Checkbox
            </a>
            <a href="./html/radio.html" class="nav-item" data-page="radio" target="content-frame">
              <span class="icon">🔘</span>单选框 Radio
            </a>
            <a href="./html/switch.html" class="nav-item" data-page="switch" target="content-frame">
              <span class="icon">🔄</span>开关 Switch
            </a>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">布局与主题</div>
            <a href="./html/form-group.html" class="nav-item" data-page="form-group" target="content-frame">
              <span class="icon">📦</span>表单组合 Form Group
            </a>
            <a href="./html/theme.html" class="nav-item" data-page="theme" target="content-frame">
              <span class="icon">🎨</span>主题系统
            </a>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">反馈组件</div>
            <a href="./html/notification.html" class="nav-item" data-page="notification" target="content-frame">
              <span class="icon">🔔</span>消息通知 Notification
            </a>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">示例</div>
            <a href="./html/example.html" class="nav-item" data-page="example" target="content-frame">
              <span class="icon">📋</span>完整示例
            </a>
          </div>
        </nav>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <iframe name="content-frame" class="content-iframe" src="./html/intro.html"></iframe>
      </main>
    </div>

    <script src="./js/main.js"></script>
  </body>

</html>
